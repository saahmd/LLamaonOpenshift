---
- name: Deploy a Kafka container with Podman using KRaft mode
  hosts: all
  become: true
  vars:
    kafka_container_name: cp-kafka
    kafka_image: "docker.io/apache/kafka"
    kafka_path: "/opt/kafka/bin"
    kafka_topic: "httpd-error-logs"

  tasks:
    - name: Ensure required packages are installed
      ansible.builtin.package:
        name:
          - podman
          - python3-podman
        state: present

    - name: Pull Kafka image to ensure availability
      ansible.builtin.command:
        cmd: "podman pull {{ kafka_image }}"
      changed_when: false

    - name: Create Kafka data volume
      containers.podman.podman_volume:
        name: kafka_data

    - name: Start Apache Kafka container
      containers.podman.podman_container:
        name: "{{ kafka_container_name }}"
        image: "{{ kafka_image }}"
        hostname: "{{ kafka_container_name }}"
        state: started
        recreate: true
        restart_policy: always
        memory: 2g
        network: host                               # ← shares host network, no port mapping needed
        volumes:
          - "kafka_data:/var/lib/kafka/data"
        env:
          KAFKA_NODE_ID: "1"
          KAFKA_PROCESS_ROLES: "broker,controller"
          KAFKA_LISTENERS: "CLIENT://:9092,CONTROLLER://:9093"
          KAFKA_ADVERTISED_LISTENERS: "CLIENT://{{ kafka_external_hostname }}:9092"  # ← single listener on 9092
          KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
          KAFKA_INTER_BROKER_LISTENER_NAME: "CLIENT"
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,CLIENT:PLAINTEXT"
          KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
          KAFKA_NUM_PARTITIONS: "3"

    - name: Wait for Kafka to be ready
      ansible.builtin.wait_for:
        host: localhost
        port: 9092
        delay: 5
        timeout: 60

    - name: List Kafka topics
      ansible.builtin.command:
        cmd: "podman exec {{ kafka_container_name }} {{ kafka_path }}/kafka-topics.sh --list --bootstrap-server localhost:9092"
      register: topic_list
      changed_when: false
      retries: 5
      delay: 5
      until: topic_list.rc == 0

    - name: Debug Kafka topics before creation
      ansible.builtin.debug:
        msg: "Topics found: {{ topic_list.stdout_lines }}"

    - name: Create Kafka topic if it does not exist
      ansible.builtin.command:
        cmd: >
          podman exec {{ kafka_container_name }} {{ kafka_path }}/kafka-topics.sh
          --create
          --topic {{ kafka_topic }}
          --bootstrap-server localhost:9092
          --partitions 3
          --replication-factor 1
      register: push_topic
      changed_when: "'Created topic' in push_topic.stdout"
      retries: 5
      delay: 5
      until: push_topic.rc == 0
      when: kafka_topic not in topic_list.stdout_lines

    - name: List Kafka topics after creation
      ansible.builtin.command:
        cmd: "podman exec {{ kafka_container_name }} {{ kafka_path }}/kafka-topics.sh --list --bootstrap-server localhost:9092"
      register: topic_list_final
      changed_when: false

    - name: Debug Kafka topics after creation
      ansible.builtin.debug:
        msg: "Topics after setup: {{ topic_list_final.stdout_lines }}"

    - name: Restrict controller port from external access
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "9093"
        source: "! 127.0.0.1"
        jump: DROP

