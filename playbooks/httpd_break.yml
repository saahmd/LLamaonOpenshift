---
- name: Break Apache by adding invalid directive
  hosts: all
  become: true
  tasks:
    - name: Add InvalidDirectiveHere to httpd config
      ansible.builtin.lineinfile:
        path: /etc/httpd/conf/httpd.conf
        insertafter: '^ServerRoot'
        line: 'InvalidDirectiveHere'
        state: present
 
    - name: Kill httpd processes
      ansible.builtin.command:
        cmd: pkill -9 httpd
      ignore_errors: true
 
    - name: Wait for httpd to fully stop
      ansible.builtin.pause:
        seconds: 3
 
    - name: Attempt to start httpd with broken config
      ansible.builtin.command:
        cmd: httpd -D FOREGROUND
      async: 5
      poll: 0
      ignore_errors: true
 
    - name: Verify Apache config is broken
      ansible.builtin.command:
        cmd: httpd -t
      register: httpd_config_test
      failed_when: httpd_config_test.rc == 0
      changed_when: false
 
    - name: Show config error
      ansible.builtin.debug:
        msg: "{{ httpd_config_test.stderr }}"
