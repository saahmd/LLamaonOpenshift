---
- name: Break Apache by adding invalid directive
  hosts: all
  become: true
  tasks:
    - name: Add InvalidDirectiveHere to httpd config
      ansible.builtin.lineinfile:
        path: /etc/httpd/conf/httpd.conf
        insertafter: '^ServerRoot'
        line: 'InvalidDirectiveHere'
        state: present

    - name: Gracefully stop httpd (triggers shutdown log entry)
      ansible.builtin.command:
        cmd: apachectl graceful-stop
      ignore_errors: true

    - name: Wait for graceful shutdown to complete
      ansible.builtin.pause:
        seconds: 3

    - name: Attempt to restart httpd (will fail due to bad config)
      ansible.builtin.systemd:
        name: httpd
        state: restarted
      ignore_errors: true

    - name: Verify Apache config is broken
      ansible.builtin.command:
        cmd: httpd -t
      register: httpd_config_test
      failed_when: httpd_config_test.rc == 0
      changed_when: false

    - name: Show config error
      ansible.builtin.debug:
        msg: "{{ httpd_config_test.stderr }}"
